name: Windows (x64 + arm64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
        os: [win]
        conf: [Debug, Release]
    steps:
    - uses: actions/checkout@v4

    # ----------------------------------------------------
    # Notify: Workflow Started (Embed)
    # ----------------------------------------------------
    - name: Notify Discord (started)
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WORKFLOW_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WORKFLOW_WEBHOOK_TOKEN }}
        username: "GitHub Actions"
        embed: |
          {
            "title": "🚀 Workflow Started",
            "description": "The workflow **${{ github.workflow }}** has begun.",
            "color": 3447003,
            "fields": [
              { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
              { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
              { "name": "Commit", "value": "${{ github.sha }}", "inline": false }
            ],
            "timestamp": "${{ github.event.head_commit.timestamp }}"
          }

    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build GenOnlineService/GenOnlineService.csproj --configuration ${{ matrix.conf }} --os ${{ matrix.os }} --arch ${{ matrix.arch }}
      
    - name: Test
      run: dotnet test GenOnlineService/GenOnlineService.csproj --no-build --verbosity normal --configuration ${{ matrix.conf }} --os ${{ matrix.os }} --arch ${{ matrix.arch }}

    - name: Publish
      run: dotnet publish GenOnlineService/GenOnlineService.csproj --configuration ${{ matrix.conf }} --os ${{ matrix.os }} --arch ${{ matrix.arch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GenOnlineService_${{ matrix.os }}_${{ matrix.arch }}_${{matrix.conf}}
        path: /home/runner/work/Services/Services/GenOnlineService/bin/${{matrix.conf}}/net10.0/${{matrix.os}}-${{matrix.arch}}/publish/

      # ----------------------------------------------------
    # Notify: Success (Embed)
    # ----------------------------------------------------
    - name: Notify Discord (success)
      if: success()
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WORKFLOW_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WORKFLOW_WEBHOOK_TOKEN }}
        username: "GitHub Actions"
        embed: |
          {
            "title": "✅ Workflow Succeeded",
            "description": "The workflow **${{ github.workflow }}** completed successfully.",
            "color": 3066993,
            "fields": [
              { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
              { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
              { "name": "Commit", "value": "${{ github.sha }}", "inline": false }
            ],
            "timestamp": "${{ github.event.head_commit.timestamp }}"
          }

    # ----------------------------------------------------
    # Notify: Failure (Embed)
    # ----------------------------------------------------
    - name: Notify Discord (failure)
      if: failure()
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WORKFLOW_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WORKFLOW_WEBHOOK_TOKEN }}
        username: "GitHub Actions"
        embed: |
          {
            "title": "❌ Workflow Failed",
            "description": "The workflow **${{ github.workflow }}** has failed.",
            "color": 15158332,
            "fields": [
              { "name": "Repository", "value": "${{ github.repository }}", "inline": true },
              { "name": "Branch", "value": "${{ github.ref_name }}", "inline": true },
              { "name": "Commit", "value": "${{ github.sha }}", "inline": false }
            ],
            "timestamp": "${{ github.event.head_commit.timestamp }}"
          }
